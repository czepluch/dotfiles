# Hyprlock - cypherpunk lockscreen
# Terminal-green palette, minimal layout + subtle CRT styling
#
# Layout:
#   top-left      clock with chromatic R/C split, POSIX + ISO underneath
#   top-right     kernel / uptime / net / battery
#   bottom-right  live SHA-256 of $(date +%s), recomputes every second
#   bottom-left   SESSION LOCKED + user@host password prompt
#   accent        terminal green (#3aff5c), dim variants for borders/labels
#   corners       4 L-shaped crosshair ticks, 48px inset, per-corner anchored
#
# Notes on what survived the port from the HTML mockup:
#   - chromatic R/C split is faked by stacking 3 labels at +/-4px x offsets.
#     hyprlock has no blend modes, so the colored copies sit as fringes
#     beside the white core rather than screen-blended. Still reads.
#   - scanlines, drop-shadow glow on the clock, and animated noise overlay
#     do NOT port (no shader/filter support in hyprlock). Background blur,
#     contrast, and brightness carry most of the mood.
#
# Coordinate convention used here:
#   - hyprlock's y-axis is positive=up. For a label/shape with valign=top,
#     negative y moves it DOWN from the top edge. For valign=bottom,
#     positive y moves it UP from the bottom edge. Same idea for halign.
#
# Sizing:
#   Everything is roughly 2x the previous (smaller) revision. If the clock
#   feels too dominant, drop font_size on the three clock labels from 240
#   to 200 and shift the chromatic ghost offsets from +/-4 back to +/-3.
#
# Fonts:
#   Terminess Nerd Font to match the old config. Swap to
#   JetBrainsMono Nerd Font if you want it crisper at the clock size.

# hyprlang noerror true
source = ~/.config/themes/current/hyprlock.conf
# hyprlang noerror false

# -------- palette (override the sourced theme so the look is stable) --------
$accent       = rgba(58, 255, 92, 1.0)
$accent_dim   = rgba(58, 255, 92, 0.55)
$accent_glow  = rgba(58, 255, 92, 0.2)
$fg           = rgba(231, 230, 223, 1.0)
$fg_dim       = rgba(207, 208, 200, 0.7)
$fg_dimmer    = rgba(207, 208, 200, 0.45)
$bg_input     = rgba(0, 0, 0, 0.55)
$chrom_red    = rgba(255, 58, 106, 0.7)
$chrom_cyan   = rgba(60, 240, 212, 0.7)

# ---------- general ----------
general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = true
}

# ---------- background (kept from your existing config) ----------
background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 5
    noise = 0.02
    contrast = 0.7
    brightness = 0.4
    vibrancy = 0.0
    vibrancy_darkness = 0.5
}

# ============================================================================
# TOP-LEFT - date - clock - POSIX - ISO
# ============================================================================

# Date - DAY-OF-WEEK (above the clock)
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%Y-%m-%d')  ·  $(date +'%A' | tr '[:lower:]' '[:upper:]')"
    color = $fg_dim
    font_size = 28
    font_family = Terminess Nerd Font
    position = 80, -120
    halign = left
    valign = top
}

# ---- Clock - chromatic R/C/W stack -----------------------------------------
# Three identical labels, slightly offset on x, different colors.
# Order matters: hyprlock paints later-declared labels on top, so the white
# core is declared LAST.

# red ghost (-10 px)
label {
    monitor =
    text = cmd[update:1000] date +'%H:%M:%S'
    color = $chrom_red
    font_size = 240
    font_family = Terminess Nerd Font
    position = 70, -218
    halign = left
    valign = top
}
# cyan ghost (+10 px)
label {
    monitor =
    text = cmd[update:1000] date +'%H:%M:%S'
    color = $chrom_cyan
    font_size = 240
    font_family = Terminess Nerd Font
    position = 90, -218
    halign = left
    valign = top
}
# white core
label {
    monitor =
    text = cmd[update:1000] date +'%H:%M:%S'
    color = $fg
    font_size = 240
    font_family = Terminess Nerd Font
    position = 80, -218
    halign = left
    valign = top
}

# POSIX label
label {
    monitor =
    text = POSIX
    color = $accent_dim
    font_size = 28
    font_family = Terminess Nerd Font
    position = 80, -568
    halign = left
    valign = top
}
# POSIX value
label {
    monitor =
    text = cmd[update:1000] date +%s
    color = $accent
    font_size = 52
    font_family = Terminess Nerd Font
    position = 200, -556
    halign = left
    valign = top
}

# ISO / UTC offset
label {
    monitor =
    text = cmd[update:1000] echo "UTC$(date +%:::z)  ·  ISO $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
    color = $fg_dimmer
    font_size = 26
    font_family = Terminess Nerd Font
    position = 80, -658
    halign = left
    valign = top
}

# ============================================================================
# TOP-RIGHT - sysinfo
# ============================================================================

label {
    monitor =
    text = cmd[update:60000] echo "<span foreground='##5cff7a' alpha='55%'>linux</span> $(uname -r)"
    color = $fg_dim
    font_size = 26
    font_family = Terminess Nerd Font
    position = -80, -80
    halign = right
    valign = top
}
label {
    monitor =
    text = cmd[update:60000] echo "<span foreground='##5cff7a' alpha='55%'>up</span> $(uptime -p | sed 's/up //')"
    color = $fg_dim
    font_size = 26
    font_family = Terminess Nerd Font
    position = -80, -124
    halign = right
    valign = top
}
label {
    monitor =
    text = cmd[update:30000] echo "<span foreground='##5cff7a' alpha='55%'>bat</span> $(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -1)%"
    color = $fg_dim
    font_size = 26
    font_family = Terminess Nerd Font
    position = -80, -168
    halign = right
    valign = top
}

# ============================================================================
# BOTTOM-RIGHT - live SHA-256 of $(date +%s)
# ============================================================================
# 64 hex chars formatted as 4 rows of 8 bytes, space-separated.
# Reproducible at a shell:   date +%s | sha256sum
label {
    monitor =
    text = cmd[update:1000] date +%s | sha256sum | head -c 64 | fold -w16 | sed 's/\(..\)/\1 /g' | sed '1s|^\(..\) |<span foreground="##3aff5c">\1</span> |'
    color = $fg_dim
    font_size = 32
    font_family = Terminess Nerd Font
    position = -80, 160
    halign = right
    valign = bottom
}

# ============================================================================
# BOTTOM-LEFT - prompt + password input
# ============================================================================

label {
    monitor =
    text = SESSION LOCKED
    color = $fg_dimmer
    font_size = 22
    font_family = Terminess Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 640, 76
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = 0
    outer_color = $accent_dim
    inner_color = $bg_input
    font_color = $accent
    font_family = Terminess Nerd Font
    fade_on_empty = false
    placeholder_text = <span font_family="Terminess Nerd Font" foreground="##5cff7a" alpha="60%">jstcz@anonfunc  ›</span>
    hide_input = false
    rounding = 0
    check_color = $accent
    fail_color = rgba(255, 85, 85, 1)
    fail_text = <span font_family="Terminess Nerd Font" foreground="##ff5555">ACCESS DENIED</span>
    fail_timeout = 2000
    fail_transition = 200
    position = 0, 0
    halign = center
    valign = center
}

# ============================================================================
# CORNER CROSSHAIR TICKS - 4 corners, 2 strokes each (H + V), 48px inset
# ============================================================================
# Each corner is an L: a horizontal arm 28px long and a vertical arm 28px tall
# meeting at the inset point. Anchored per-corner so the layout works at any
# resolution. Position values assume hyprlock anchors shapes by their center
# (each arm offset by 14 = size/2 along its long axis).

# ---- top-left ----
shape {
    monitor =
    size = 28, 2
    color = $accent_dim
    rounding = 0
    border_size = 0
    position = 62, -48
    halign = left
    valign = top
}
shape {
    monitor =
    size = 2, 28
    color = $accent_dim
    rounding = 0
    border_size = 0
    position = 48, -62
    halign = left
    valign = top
}

# ---- top-right ----
shape {
    monitor =
    size = 28, 2
    color = $accent_dim
    rounding = 0
    border_size = 0
    position = -62, -48
    halign = right
    valign = top
}
shape {
    monitor =
    size = 2, 28
    color = $accent_dim
    rounding = 0
    border_size = 0
    position = -48, -62
    halign = right
    valign = top
}

# ---- bottom-left ----
shape {
    monitor =
    size = 28, 2
    color = $accent_dim
    rounding = 0
    border_size = 0
    position = 62, 48
    halign = left
    valign = bottom
}
shape {
    monitor =
    size = 2, 28
    color = $accent_dim
    rounding = 0
    border_size = 0
    position = 48, 62
    halign = left
    valign = bottom
}

# ---- bottom-right ----
shape {
    monitor =
    size = 28, 2
    color = $accent_dim
    rounding = 0
    border_size = 0
    position = -62, 48
    halign = right
    valign = bottom
}
shape {
    monitor =
    size = 2, 28
    color = $accent_dim
    rounding = 0
    border_size = 0
    position = -48, 62
    halign = right
    valign = bottom
}
