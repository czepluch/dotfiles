# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Starship Configuration
#
# NOTE: The palette section between THEME-START/THEME-END markers is managed
# by theme-apply. Run 'theme-set <palette>' to update colors.

# Timeout for commands (in milliseconds)
command_timeout = 1000
scan_timeout = 30

# Add a blank line between shell prompts
add_newline = true

# ### THEME-START ###
palette = "theme"

[palettes.theme]
background = "#1e1e2e"
foreground = "#cdd6f4"
black = "#45475a"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#cba6f7"
cyan = "#94e2d5"
white = "#bac2de"
bright-black = "#585b70"
bright-red = "#f38ba8"
bright-green = "#a6e3a1"
bright-yellow = "#f9e2af"
bright-blue = "#89b4fa"
bright-magenta = "#cba6f7"
bright-cyan = "#94e2d5"
bright-white = "#a6adc8"
# ### THEME-END ###

# Format string - defines the order and layout of modules
format = """
[╭─](bright-black)\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_state\
$git_metrics\
$fill\
$cmd_duration\
$line_break\
[╰─](bright-black)\
$character\
"""

# Replace the "❯" symbol in the prompt with "➜"
[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"
vimcmd_symbol = "[⌘](bold yellow)"

# Shows current username
[username]
style_user = "bold yellow"
style_root = "bold red"
format = "[$user]($style) "
disabled = false
show_always = true

# Shows current directory
[directory]
truncation_length = 3
truncate_to_repo = true
fish_style_pwd_dir_length = 0
use_logical_path = true
format = "[$path]($style)[$read_only]($read_only_style) "
style = "bold cyan"
read_only = " "
read_only_style = "red"
truncation_symbol = "…/"
home_symbol = "~"

# Git branch name
[git_branch]
symbol = " "
format = "on[$symbol$branch(:$remote_branch)]($style) "
style = "bold magenta"
truncation_length = 24
truncation_symbol = "…"
only_attached = false

# Git status - shows repository state
[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"
conflicted = "⚔️ "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
up_to_date = "✓"
untracked = "?${count} "
stashed = "\\$${count} "
modified = "!${count} "
staged = "+${count} "
renamed = "»${count} "
deleted = "✘${count} "

# Git state (rebase, merge, etc.)
[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
style = "bright-black"

# Git metrics (added/deleted lines)
[git_metrics]
added_style = "bold green"
deleted_style = "bold red"
only_nonzero_diffs = true
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'
disabled = false

# Command duration
[cmd_duration]
min_time = 500
format = "took [$duration]($style) "
style = "bold yellow"
show_milliseconds = false

# Fill space between left and right sections
[fill]
symbol = " "

# Line break
[line_break]
disabled = false

# Programming language and tool versions
# These show up automatically when you're in a project with relevant files

[nodejs]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "bold green"
# Only show when in a directory with Node.js files (not by extension)
detect_extensions = []  # Disable showing nodejs based on file extensions
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]

[python]
symbol = " "
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style = "bold yellow"

[rust]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "bold red"

[golang]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "bold cyan"

[gleam]
symbol = "⭐ "
format = "via [$symbol($version )]($style)"
style = "bold magenta"

[solidity]
symbol = "◆ "
format = "via [$symbol($version )]($style)"
style = "bold blue"

[docker_context]
symbol = " "
format = "via [$symbol$context]($style) "
style = "bold blue"
only_with_files = true

[package]
symbol = "📦 "
format = "via [$symbol$version]($style) "
style = "bold bright-black"
display_private = false

[java]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "bold red"

[ruby]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "bold red"

[terraform]
symbol = "💠 "
format = "via [$symbol$workspace]($style) "
style = "bold magenta"

[kubernetes]
symbol = "☸ "
format = 'on [$symbol$context( \($namespace\))]($style) '
style = "bold blue"
disabled = false
